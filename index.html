<!DOCTYPE html>
<!-- El translate="no" evita que Google Translate rompa el código interno -->
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrediNova - Compra y Vende a Cuotas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: { brand: { dark: '#0D1324', purple: '#7C3AED', blue: '#2563EB', green: '#06D6A0', bg: '#F8FAFC' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F8FAFC; color: #0D1324; overflow-x: hidden; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="bg-brand-dark text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex flex-wrap items-center justify-between gap-4">
            <!-- Logo -->
            <div class="flex items-center cursor-pointer transform hover:scale-105 transition" onclick="render('home')">
                <div class="bg-gradient-to-br from-brand-blue to-brand-purple text-white p-2 rounded-lg mr-3 shadow-lg">
                    <i class="fa-solid fa-bolt text-2xl"></i>
                </div>
                <h1 class="text-2xl font-black tracking-tight">CrediNova</h1>
            </div>

            <!-- Buscador -->
            <div class="flex-grow max-w-xl hidden md:flex">
                <div class="flex w-full bg-white rounded-full overflow-hidden shadow focus-within:ring-2 focus-within:ring-brand-purple">
                    <div class="pl-4 pr-2 py-2 bg-gray-50 border-r border-gray-200 flex items-center">
                        <i class="fa-solid fa-location-dot text-red-500 mr-2"></i>
                        <select class="bg-transparent text-gray-600 text-sm outline-none font-medium">
                            <option>Toda Colombia</option>
                            <option>Bogotá</option>
                            <option>Medellín</option>
                            <option>Cartagena</option>
                        </select>
                    </div>
                    <input type="text" placeholder="Ej. Motos, Tecnología, Ropa..." class="w-full px-4 py-2 text-gray-800 outline-none">
                    <button class="bg-brand-purple hover:bg-purple-600 text-white px-6 font-bold transition">Buscar</button>
                </div>
            </div>

            <!-- Botones de Usuario -->
            <div id="nav-user-area" class="flex items-center gap-4">
                <!-- Se inyecta con JS -->
            </div>
        </div>

        <!-- Categorías Inferiores -->
        <div class="border-t border-gray-800 bg-[#0B101E]">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-2 flex gap-6 overflow-x-auto text-sm font-medium text-gray-300 whitespace-nowrap">
                <button class="hover:text-white" onclick="render('home', 'Transportes')"><i class="fa-solid fa-motorcycle mr-1"></i> Transportes</button>
                <button class="hover:text-white" onclick="render('home', 'Tecnología')"><i class="fa-solid fa-laptop mr-1"></i> Tecnología</button>
                <button class="hover:text-white" onclick="render('home', 'Moda')"><i class="fa-solid fa-shirt mr-1"></i> Moda</button>
                <button class="text-brand-green font-bold hover:text-green-400" onclick="render('home')"><i class="fa-solid fa-fire mr-1"></i> Ofertas</button>
            </div>
        </div>
    </header>

    <!-- Contenedor Principal -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" id="app-content">
        <div class="text-center py-20"><i class="fa-solid fa-circle-notch fa-spin text-4xl text-brand-purple"></i></div>
    </main>

    <!-- Modales y Notificaciones -->
    <div id="modal-container" class="fixed inset-0 bg-brand-dark/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4"></div>
    <div id="toast-container" class="fixed bottom-4 right-4 z-[110] flex flex-col gap-2 pointer-events-none"></div>

    <script>
    try {
        let db = {
            users: JSON.parse(localStorage.getItem('cn_users')) || [],
            currentUser: JSON.parse(localStorage.getItem('cn_user')) || null,
            products: JSON.parse(localStorage.getItem('cn_products')) || [],
            kycRequests: JSON.parse(localStorage.getItem('cn_kyc')) || [],
            chats: JSON.parse(localStorage.getItem('cn_chats')) || []
        };

        const adminEmail = "oscarlewisguerrerogonzalez@gmail.com";

        // Crear usuario administrador por defecto si no existe
        if (!db.users.find(u => u.email === adminEmail)) {
            db.users.push({ nombre: "Administrador", email: adminEmail, pass: "123456" });
            saveDB();
        }

        // Productos de muestra por defecto
        if (db.products.length === 0) {
            db.products = [
                { id: 'p1', name: 'Yamaha R6 Deportiva', price: 45000000, category: 'Transportes', subcategory: 'Motos', city: 'Cartagena', image: 'https://placehold.co/600x400/ef4444/ffffff?text=Yamaha+R6', desc: 'Excelente estado, lista para traspaso.', sellerEmail: 'vendedor@test.com', status: 'approved' },
                { id: 'p2', name: 'Suéter Hugo Boss Original Negro', price: 250000, category: 'Moda', subcategory: 'Suéter', city: 'Bogotá', image: 'https://placehold.co/400x600/1e293b/ffffff?text=Sueter+Boss', desc: 'Algodón premium, talla M. Ajuste perfecto.', sellerEmail: 'moda@test.com', status: 'approved' },
                { id: 'p3', name: 'Smart TV Samsung 65"', price: 2100000, category: 'Tecnología', subcategory: 'Televisor', city: 'Medellín', image: 'https://placehold.co/600x400/3b82f6/ffffff?text=Smart+TV', desc: 'Resolución 4K, Smart Hub.', sellerEmail: 'tech@test.com', status: 'approved' }
            ];
            saveDB();
        }

        function saveDB() {
            localStorage.setItem('cn_users', JSON.stringify(db.users));
            localStorage.setItem('cn_user', JSON.stringify(db.currentUser));
            localStorage.setItem('cn_products', JSON.stringify(db.products));
            localStorage.setItem('cn_kyc', JSON.stringify(db.kycRequests));
            localStorage.setItem('cn_chats', JSON.stringify(db.chats));
            updateNavbar();
        }

        const formatMoney = (amount) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(amount);

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bg = type === 'success' ? 'bg-brand-green' : type === 'error' ? 'bg-red-500' : 'bg-brand-blue';
            toast.className = `${bg} text-white px-6 py-3 rounded-xl shadow-2xl font-bold text-sm transform transition-all duration-300 translate-y-10 opacity-0`;
            toast.innerHTML = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 4000); // 4 segundos
        }

        function updateNavbar() {
            const nav = document.getElementById('nav-user-area');
            if (db.currentUser) {
                const isAdmin = db.currentUser.email === adminEmail;
                let unreadChats = db.chats.filter(c => (c.buyerEmail === db.currentUser.email || c.sellerEmail === db.currentUser.email)).length;
                
                nav.innerHTML = `
                    <button onclick="render('chats')" class="relative text-gray-300 hover:text-white transition bg-gray-800 p-2 rounded-full" title="Mis Mensajes">
                        <i class="fa-solid fa-comment-dots text-xl"></i>
                        ${unreadChats > 0 ? `<span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 rounded-full">${unreadChats}</span>` : ''}
                    </button>
                    ${isAdmin ? `<button onclick="render('admin')" class="bg-red-500 hover:bg-red-600 text-white text-sm font-bold px-4 py-2 rounded-lg shadow-lg flex items-center gap-2"><i class="fa-solid fa-shield-halved"></i> Aprobar Tiendas</button>` : ''}
                    <button onclick="render('dashboard')" class="bg-white text-brand-dark hover:bg-gray-100 text-sm font-bold px-4 py-2 rounded-lg shadow flex items-center gap-2"><i class="fa-solid fa-store"></i> Mi Tienda</button>
                    <button onclick="logout()" class="text-gray-400 hover:text-red-400 text-sm ml-2 font-medium border border-gray-600 px-3 py-1 rounded">Salir</button>
                `;
            } else {
                nav.innerHTML = `
                    <button onclick="showLogin()" class="text-gray-300 hover:text-white text-sm font-bold mr-2">Ingresar</button>
                    <button onclick="showRegister()" class="bg-brand-purple hover:bg-purple-600 text-white text-sm font-bold px-6 py-2 rounded-full shadow-lg">Crear Cuenta</button>
                `;
            }
        }

        window.render = function(view, param = null) {
            const content = document.getElementById('app-content');
            content.innerHTML = '<div class="text-center py-20"><i class="fa-solid fa-circle-notch fa-spin text-4xl text-brand-purple"></i></div>';
            
            setTimeout(() => {
                try {
                    if (view === 'home') renderHome(content, param);
                    else if (view === 'product') renderProduct(content, param);
                    else if (view === 'dashboard') renderDashboard(content);
                    else if (view === 'new_product') renderNewProductForm(content);
                    else if (view === 'admin') renderAdmin(content);
                    else if (view === 'chats') renderChats(content);
                    else if (view === 'chatRoom') renderChatRoom(content, param);
                } catch (error) {
                    console.error(error);
                    content.innerHTML = `<div class="bg-red-50 p-6 rounded-xl border border-red-200 text-center"><h2 class="text-red-600 font-bold text-xl mb-2"><i class="fa-solid fa-triangle-exclamation"></i> Error al cargar la vista</h2><p class="text-gray-700">${error.message}</p><button onclick="render('home')" class="mt-4 bg-brand-dark text-white px-4 py-2 rounded-lg">Volver al inicio</button></div>`;
                }
            }, 100);
        };

        function renderHome(container, categoryFilter) {
            let productsToShow = [...db.products].filter(p => p.status === 'approved').reverse();
            if (categoryFilter) {
                productsToShow = productsToShow.filter(p => p.category === categoryFilter);
            }

            let html = `<div class="fade-in space-y-10">`;

            // BANNER PRINCIPAL ELEGANTE
            if (!categoryFilter) {
                html += `
                    <div class="bg-brand-dark rounded-3xl overflow-hidden shadow-2xl relative border border-gray-800">
                        <div class="absolute top-0 right-0 w-96 h-96 bg-brand-purple rounded-full mix-blend-screen filter blur-[100px] opacity-40"></div>
                        <div class="absolute bottom-0 left-20 w-72 h-72 bg-brand-blue rounded-full mix-blend-screen filter blur-[80px] opacity-30"></div>
                        
                        <div class="relative z-20 p-10 md:p-16 flex flex-col justify-center h-full max-w-2xl text-white">
                            <h2 class="text-4xl md:text-5xl font-black mb-4 leading-tight">
                                Descubre, compra y vende en <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-blue to-brand-green">CrediNova</span>
                            </h2>
                            <p class="text-gray-300 text-lg mb-8">El marketplace seguro donde encuentras todo lo que necesitas a cuotas y conectas con miles de compradores.</p>
                            <div class="flex gap-4">
                                <button onclick="window.scrollTo({top: 500, behavior: 'smooth'})" class="bg-brand-purple hover:bg-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition">Explorar Catálogo</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            // GRID DE PRODUCTOS
            html += `
                <div>
                    <h3 class="text-2xl font-bold mb-6 text-brand-dark">${categoryFilter ? `Resultados en: ${categoryFilter}` : 'Publicaciones Recientes'}</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            `;

            if (productsToShow.length === 0) {
                html += `<div class="col-span-full text-center py-10 bg-white rounded-2xl border border-dashed border-gray-300 text-gray-500">No hay productos en esta categoría aún.</div>`;
            } else {
                productsToShow.forEach(p => {
                    html += `
                        <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition duration-300 border border-gray-100 flex flex-col cursor-pointer overflow-hidden group" onclick="render('product', '${p.id}')">
                            <div class="h-56 bg-gray-50 p-4 relative flex items-center justify-center">
                                <span class="absolute top-3 left-3 bg-white/90 backdrop-blur text-brand-dark text-[10px] font-bold px-2 py-1 rounded shadow-sm">${p.subcategory || p.category}</span>
                                <!-- object-contain asegura que no se recorte ropa ni motos -->
                                <img src="${p.image}" class="w-full h-full object-contain group-hover:scale-105 transition duration-500" alt="${p.name}">
                            </div>
                            <div class="p-5 flex-grow flex flex-col justify-between border-t border-gray-50">
                                <div>
                                    <h4 class="font-bold text-gray-800 leading-tight mb-2 line-clamp-2">${p.name}</h4>
                                    <p class="text-xs text-gray-500 mb-3"><i class="fa-solid fa-location-dot text-red-500"></i> ${p.city}</p>
                                </div>
                                <div>
                                    <p class="text-2xl font-black text-brand-dark">${formatMoney(p.price)}</p>
                                    <p class="text-xs text-brand-purple font-bold mt-1 bg-purple-50 inline-block px-2 py-1 rounded">Llévalo a cuotas</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            html += `</div></div></div>`;
            container.innerHTML = html;
        }

        function renderProduct(container, productId) {
            const p = db.products.find(x => x.id === productId);
            if (!p) return render('home');

            container.innerHTML = `
                <div class="fade-in bg-white rounded-3xl shadow-sm border border-gray-100 p-6 md:p-10 max-w-6xl mx-auto flex flex-col md:flex-row gap-10 relative">
                    
                    <button onclick="render('home')" class="absolute top-6 left-6 text-gray-400 hover:text-brand-dark font-bold text-sm bg-gray-100 px-3 py-1 rounded-lg transition"><i class="fa-solid fa-arrow-left"></i> Volver</button>

                    <!-- Imagen sin recortar (object-contain) fundamental para ropa/suéteres -->
                    <div class="w-full md:w-1/2 pt-10">
                        <div class="bg-gray-50 rounded-3xl p-6 border border-gray-100 h-[500px] flex items-center justify-center">
                            <img src="${p.image}" class="max-w-full max-h-full object-contain drop-shadow-xl" alt="${p.name}">
                        </div>
                    </div>
                    
                    <!-- Información y Simulador -->
                    <div class="w-full md:w-1/2 flex flex-col justify-center pt-10 md:pt-0">
                        <div class="flex gap-2 mb-3">
                            <span class="bg-brand-bg text-brand-blue text-xs font-bold px-3 py-1 rounded-full uppercase">${p.category}</span>
                            <span class="bg-gray-100 text-gray-600 text-xs font-bold px-3 py-1 rounded-full uppercase"><i class="fa-solid fa-location-dot text-red-500"></i> ${p.city}</span>
                        </div>
                        
                        <h1 class="text-3xl md:text-4xl font-black text-brand-dark mb-4">${p.name}</h1>
                        <p class="text-gray-500 mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100 leading-relaxed text-sm">${p.desc}</p>
                        
                        <div class="mb-8 border-b border-gray-100 pb-6">
                            <p class="text-sm text-gray-500 font-bold mb-1">Precio de Contado:</p>
                            <p class="text-4xl md:text-5xl font-black text-brand-dark">${formatMoney(p.price)}</p>
                        </div>

                        <!-- SIMULADOR DE CUOTAS INTELIGENTE -->
                        <div class="bg-[#F8FAFC] rounded-2xl p-6 border border-blue-100 mb-8 relative">
                            <div class="absolute -top-3 left-6 bg-brand-purple text-white text-[10px] font-bold px-3 py-1 rounded shadow uppercase tracking-wider"><i class="fa-solid fa-calculator"></i> Simulador de Crédito</div>
                            
                            <div class="grid grid-cols-2 gap-4 mt-2">
                                <div>
                                    <label class="text-xs font-bold text-gray-500">Cuota Inicial ($)</label>
                                    <input type="number" id="sim-inicial" value="${Math.floor(p.price * 0.2)}" class="w-full border border-gray-300 rounded-lg p-2 outline-none font-bold text-brand-dark mt-1" oninput="calcularCuota(${p.price})">
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-gray-500">Plazo</label>
                                    <select id="sim-meses" class="w-full border border-gray-300 rounded-lg p-2 outline-none font-bold text-brand-dark mt-1" onchange="calcularCuota(${p.price})">
                                        <option value="6">6 Meses</option>
                                        <option value="12" selected>12 Meses</option>
                                        <option value="24">24 Meses</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="mt-4 bg-white p-4 rounded-xl border border-gray-200 flex justify-between items-center">
                                <span class="font-bold text-gray-600 text-sm">Tu cuota mensual será aprox:</span>
                                <span id="sim-resultado" class="text-2xl font-black text-brand-blue">${formatMoney((p.price - Math.floor(p.price * 0.2)) / 12)}</span>
                            </div>
                        </div>

                        <!-- Botones de Acción (Chat Privado Interno) -->
                        <div class="flex gap-4">
                            <button onclick="iniciarChat('${p.id}', '${p.sellerEmail}', '${p.name}')" class="flex-grow bg-brand-dark hover:bg-black text-white font-bold py-4 rounded-xl shadow-lg transition flex items-center justify-center gap-2 text-lg">
                                <i class="fa-solid fa-comment-dots text-xl"></i> Chat Privado
                            </button>
                            <button onclick="showToast('Enlace copiado al portapapeles para compartir')" class="w-16 bg-gray-100 hover:bg-gray-200 text-brand-dark font-bold rounded-xl flex items-center justify-center transition" title="Compartir">
                                <i class="fa-solid fa-share-nodes text-xl"></i>
                            </button>
                        </div>
                        
                        <div class="mt-4 text-center">
                            <p class="text-xs text-gray-400 font-bold"><i class="fa-solid fa-shield-check text-brand-green"></i> Vendedor Verificado por CrediNova</p>
                        </div>
                    </div>
                </div>
            `;
        }

        window.calcularCuota = function(precioTotal) {
            const inicial = parseInt(document.getElementById('sim-inicial').value) || 0;
            const meses = parseInt(document.getElementById('sim-meses').value) || 1;
            let saldo = precioTotal - inicial;
            if (saldo <= 0) saldo = 0;
            const cuota = saldo / meses;
            document.getElementById('sim-resultado').innerText = formatMoney(cuota);
        }

        window.iniciarChat = function(productId, sellerEmail, productName) {
            if (!db.currentUser) return showLogin();
            if (db.currentUser.email === sellerEmail) return showToast('Este es tu propio producto', 'error');

            const chatId = db.currentUser.email + '_' + sellerEmail + '_' + productId;
            let chat = db.chats.find(c => c.id === chatId);
            
            if (!chat) {
                chat = {
                    id: chatId,
                    buyerEmail: db.currentUser.email,
                    sellerEmail: sellerEmail,
                    productId: productId,
                    productName: productName,
                    messages: []
                };
                db.chats.push(chat);
                saveDB();
            }
            render('chatRoom', chatId);
        };

        function renderChats(container) {
            if (!db.currentUser) return showLogin();
            
            const misChats = db.chats.filter(c => c.buyerEmail === db.currentUser.email || c.sellerEmail === db.currentUser.email);

            let html = `<div class="fade-in max-w-4xl mx-auto"><h2 class="text-3xl font-bold mb-8 text-brand-dark"><i class="fa-solid fa-comments text-brand-purple"></i> Mis Mensajes</h2><div class="space-y-4">`;

            if (misChats.length === 0) {
                html += `<div class="bg-white p-10 rounded-2xl text-center shadow-sm border border-gray-100 text-gray-500">No tienes conversaciones activas. Haz clic en "Chat Privado" en un producto para iniciar una.</div>`;
            } else {
                misChats.forEach(chat => {
                    const otroUsuario = chat.buyerEmail === db.currentUser.email ? chat.sellerEmail : chat.buyerEmail;
                    const ultimoMsj = chat.messages.length > 0 ? chat.messages[chat.messages.length - 1].text : 'Sin mensajes aún';
                    
                    html += `
                        <div onclick="render('chatRoom', '${chat.id}')" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:border-brand-purple cursor-pointer transition flex items-center gap-4">
                            <div class="w-12 h-12 bg-brand-bg rounded-full flex items-center justify-center text-brand-purple font-bold"><i class="fa-solid fa-user"></i></div>
                            <div class="flex-grow">
                                <h4 class="font-bold text-gray-800">${chat.productName}</h4>
                                <p class="text-xs text-gray-400 mb-1">Con: ${otroUsuario}</p>
                                <p class="text-sm text-gray-600 truncate">${ultimoMsj}</p>
                            </div>
                            <i class="fa-solid fa-chevron-right text-gray-300"></i>
                        </div>
                    `;
                });
            }
            html += `</div></div>`;
            container.innerHTML = html;
        }

        function renderChatRoom(container, chatId) {
            const chat = db.chats.find(c => c.id === chatId);
            if (!chat) return render('chats');

            const otroUsuario = chat.buyerEmail === db.currentUser.email ? chat.sellerEmail : chat.buyerEmail;

            let html = `
                <div class="fade-in max-w-3xl mx-auto bg-white rounded-3xl shadow-lg border border-gray-200 overflow-hidden flex flex-col h-[600px]">
                    <div class="bg-brand-dark p-4 flex items-center gap-4 text-white">
                        <button onclick="render('chats')" class="text-gray-400 hover:text-white"><i class="fa-solid fa-arrow-left"></i></button>
                        <div>
                            <h3 class="font-bold text-lg leading-tight">${chat.productName}</h3>
                            <p class="text-xs text-gray-400"><i class="fa-solid fa-circle text-brand-green text-[8px]"></i> Chateando con ${otroUsuario}</p>
                        </div>
                    </div>
                    
                    <div class="flex-grow p-6 bg-gray-50 overflow-y-auto flex flex-col gap-4" id="chat-messages-area">
                        ${chat.messages.length === 0 ? '<div class="text-center text-gray-400 text-sm mt-10">Envía el primer mensaje para empezar a negociar.</div>' : ''}
                        ${chat.messages.map(m => `
                            <div class="max-w-[80%] p-3 rounded-2xl text-sm ${m.sender === db.currentUser.email ? 'bg-brand-purple text-white self-end rounded-br-sm' : 'bg-white border border-gray-200 text-gray-800 self-start rounded-bl-sm'}">
                                ${m.text}
                            </div>
                        `).join('')}
                    </div>
                    
                    <form onsubmit="enviarMensaje(event, '${chat.id}')" class="p-4 bg-white border-t border-gray-100 flex gap-2">
                        <input type="text" id="chat-input" required autocomplete="off" placeholder="Escribe un mensaje..." class="flex-grow bg-gray-100 border-none rounded-full px-6 py-3 outline-none focus:ring-2 focus:ring-brand-purple">
                        <button type="submit" class="w-12 h-12 bg-brand-purple text-white rounded-full flex items-center justify-center hover:bg-purple-600 transition shadow"><i class="fa-solid fa-paper-plane"></i></button>
                    </form>
                </div>
            `;
            container.innerHTML = html;
            
            setTimeout(() => {
                const area = document.getElementById('chat-messages-area');

                    <div class="space-y-6">

                                    <button onclick="rechazarTienda('${req.email}')" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-6 rounded-lg transition"><i class="fa-solid fa-xmark"></i> Rechazar</button>

        window.aprobarTienda = function(email) {
            const req = db.kycRequests.find(k => k.email === email);
            if (req) {
                req.status = 'approved';
                saveDB();
                render('admin');
                showToast('Vendedor Aprobado Exitosamente');
            }
        }
        window.rechazarTienda = function(email) {
            db.kycRequests = db.kycRequests.filter(k => k.email !== email);
            saveDB();
            render('admin');
            showToast('Solicitud rechazada y eliminada', 'error');

        window.showLogin = function() {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl relative fade-in">
                    <button onclick="document.getElementById('modal-container').classList.add('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark text-xl"></i></button>
                    <h2 class="text-2xl font-black text-brand-dark mb-2">Ingresar</h2>
                    <p class="text-sm text-gray-500 mb-6">Bienvenido de nuevo a CrediNova.</p>
                    <form onsubmit="hacerLogin(event)" class="space-y-4">
                        <input type="email" id="log-email" required placeholder="Tu correo electrónico" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none focus:border-brand-purple">
                        <input type="password" id="log-pass" required placeholder="Tu contraseña" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none focus:border-brand-purple">
                        <button type="submit" class="w-full bg-brand-purple hover:bg-purple-600 text-white font-bold py-3 rounded-xl shadow-lg transition">Entrar</button>
                    </form>
                    <p class="text-xs text-center text-gray-500 mt-6">¿No tienes cuenta? <button onclick="showRegister()" class="text-brand-blue font-bold hover:underline">Regístrate aquí</button></p>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        window.showRegister = function() {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl relative fade-in">
                    <button onclick="document.getElementById('modal-container').classList.add('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark text-xl"></i></button>
                    <h2 class="text-2xl font-black text-brand-dark mb-2">Crear Cuenta</h2>
                    <p class="text-sm text-gray-500 mb-6">Únete para comprar y vender a cuotas.</p>
                    <form onsubmit="iniciarRegistro(event)" class="space-y-4">
                        <input type="text" id="reg-name" required placeholder="Nombre completo" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none focus:border-brand-purple">
                        <input type="email" id="reg-email" required placeholder="Correo electrónico" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none focus:border-brand-purple">
                        <input type="password" id="reg-pass" required placeholder="Crea una contraseña" minlength="6" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none focus:border-brand-purple">
                        <button type="submit" id="btn-reg" class="w-full bg-brand-dark hover:bg-black text-white font-bold py-3 rounded-xl shadow-lg transition">Registrarme</button>
                    </form>
                    <p class="text-xs text-center text-gray-500 mt-6">¿Ya tienes cuenta? <button onclick="showLogin()" class="text-brand-purple font-bold hover:underline">Ingresa aquí</button></p>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        window.iniciarRegistro = function(e) {
            e.preventDefault();
            const nombre = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value;

            // Verificar si el correo ya existe
            if(db.users.find(u => u.email === email)) {
                return showToast('Este correo ya está registrado.', 'error');
            }

            // Generar código de 4 dígitos
            const codigoVerificacion = Math.floor(1000 + Math.random() * 9000);
            
            // Animación de carga
            document.getElementById('btn-reg').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Enviando correo...';
            
            setTimeout(() => {
                showVerification(nombre, email, pass, codigoVerificacion);
                
                // Simulación de notificación de Gmail en el celular
                setTimeout(() => {
                    showToast(`📧 GMAIL: Tu código CrediNova es: <b class="text-xl ml-1 tracking-widest">${codigoVerificacion}</b>`, 'info');
                }, 1500);
            }, 1000);
        }

        window.showVerification = function(nombre, email, pass, codigo) {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl relative fade-in text-center">
                    <button onclick="document.getElementById('modal-container').classList.add('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark text-xl"></i></button>
                    <div class="w-16 h-16 bg-brand-bg rounded-full flex items-center justify-center mx-auto mb-4 text-brand-purple text-2xl">
                        <i class="fa-solid fa-envelope-open-text"></i>
                    </div>
                    <h2 class="text-2xl font-black text-brand-dark mb-2">Revisa tu correo</h2>
                    <p class="text-sm text-gray-500 mb-6">Hemos enviado un código a <b>${email}</b>. Ingrésalo para confirmar tu cuenta.</p>
                    
                    <form onsubmit="verificarCodigo(event, '${nombre}', '${email}', '${pass}', ${codigo})" class="space-y-4">
                        <input type="number" id="ver-code" required placeholder="XXXX" max="9999" class="w-full text-center text-3xl tracking-[10px] font-black bg-gray-50 border border-gray-200 rounded-xl p-4 outline-none focus:border-brand-purple">
                        <button type="submit" class="w-full bg-brand-green hover:bg-green-600 text-white font-bold py-3 rounded-xl shadow-lg transition text-lg">Confirmar Cuenta</button>
                    </form>
                </div>
            `;
        }

        window.verificarCodigo = function(e, nombre, email, pass, codigoCorrecto) {
            e.preventDefault();
            const codigoIngresado = parseInt(document.getElementById('ver-code').value);
            
            if(codigoIngresado === codigoCorrecto) {
                const newUser = { nombre, email, pass };
                db.users.push(newUser);
                db.currentUser = newUser;
                saveDB();
                document.getElementById('modal-container').classList.add('hidden');
                showToast('¡Cuenta verificada y creada exitosamente!', 'success');
                render('home');
            } else {
                showToast('El código es incorrecto. Intenta de nuevo.', 'error');
            }
        }

        window.hacerLogin = function(e) {
            e.preventDefault();
            const email = document.getElementById('log-email').value.trim();
            const pass = document.getElementById('log-pass').value;
            
            const user = db.users.find(u => u.email === email && u.pass === pass);
            
            if (user) {
                db.currentUser = user;
                saveDB();
                document.getElementById('modal-container').classList.add('hidden');
                showToast('¡Sesión iniciada correctamente!');
                render('home');
            } else {
                showToast('Correo o contraseña incorrectos.', 'error');
            }
        }

        window.logout = function() {
            db.currentUser = null;
            saveDB();
            render('home');
            showToast('Sesión cerrada');
        }

        // Inicializar la aplicación
        updateNavbar();
        render('home');

    } catch (e) {
        // Escudo Anti-Errores (Evita la Pantalla Blanca)
        document.getElementById('app-content').innerHTML = `
            <div class="max-w-2xl mx-auto bg-red-50 p-10 rounded-3xl text-center border-2 border-red-200 mt-20">
                <i class="fa-solid fa-bomb text-6xl text-red-500 mb-6"></i>
                <h2 class="text-2xl font-black text-red-700 mb-2">¡Ups! Algo se rompió en el código</h2>
                <p class="text-red-600 mb-4">Error técnico: <strong>${e.message}</strong></p>
                <p class="text-sm text-gray-600">Por favor, asegúrate de haber copiado todo el bloque de código completo sin saltarte ninguna línea.</p>
            </div>
        `;
    }
    </script>
